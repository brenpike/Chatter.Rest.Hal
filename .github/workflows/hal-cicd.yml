name: Hal CI/CD

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'The reason for running the workflow'
        required: true
        default: 'Manual build from GitHub UI'

  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'refactor/**'
      - 'chore/**'
      - 'docs/**'
      - 'test/**'
      - 'ci/**'
      - main
    paths:
      - '**/src/Chatter.Rest.Hal/**'
      - '.github/workflows/hal-cicd.yml'
      - '**/test/Chatter.Rest.Hal.Tests/**'

  pull_request:
    branches:
      - main
    paths:
      - '**/src/Chatter.Rest.Hal/**'
      - '.github/workflows/hal-cicd.yml'
      - '**/test/Chatter.Rest.Hal.Tests/**'

env:
  dotnet-version: '8.0.x'

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.dotnet-version }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test '/home/runner/work/Chatter.Rest.Hal/Chatter.Rest.Hal/test/Chatter.Rest.Hal.Tests/Chatter.Rest.Hal.Tests.csproj' -c Release --no-build

      - name: Pack
        run: dotnet pack '/home/runner/work/Chatter.Rest.Hal/Chatter.Rest.Hal/src/Chatter.Rest.Hal/Chatter.Rest.Hal.csproj' -c Release --no-build -o publish/nuget

      - name: Upload NuGet
        uses: actions/upload-artifact@v6
        with:
          name: nuget
          path: /home/runner/work/Chatter.Rest.Hal/Chatter.Rest.Hal/publish/nuget/**
          retention-days: 5
          if-no-files-found: error

  version-check:
    name: version-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version bump
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "origin/main...HEAD" -- 'src/Chatter.Rest.Hal/' | grep -v '\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No non-markdown src/ changes detected. Version bump not required."
            exit 0
          fi
          echo "Changed src/ files requiring version bump check:"
          echo "$CHANGED"

          VERSION=$(grep -m1 '<Version>' src/Chatter.Rest.Hal/Chatter.Rest.Hal.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | tr -d ' \r')

          LATEST_TAG=$(git tag -l 'hal/v*' | sort -V | tail -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing hal/v* tags found. Bootstrapping — version check passes."
            exit 0
          fi

          TAG_VERSION="${LATEST_TAG#hal/v}"

          if [ "$VERSION" = "$TAG_VERSION" ]; then
            echo "ERROR: csproj version ($VERSION) equals latest tag ($LATEST_TAG). Bump the version before merging."
            exit 1
          fi

          echo "Version check passed: csproj=$VERSION, latest tag=$LATEST_TAG"

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # main branch is protected, so this will only be true after successsful PR merge

    environment:
      name: Production

    env:
      NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY_CHATTER_HAL }}
      NUGET_URL: https://api.nuget.org/v3/index.json

    permissions:
      contents: read

    steps:
      - name: Download NuGet
        uses: actions/download-artifact@v6
        with:
          name: nuget
          path: ./dist/nuget

      - name: Push NuGet packages
        shell: bash
        run: |
          dotnet nuget push "./dist/nuget/*.nupkg" \
            -k '${{ env.NUGET_AUTH_TOKEN }}' \
            -s '${{ env.NUGET_URL }}' \
            --skip-duplicate

  tag:
    name: tag
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create version tag
        shell: bash
        run: |
          VERSION=$(grep -m1 '<Version>' src/Chatter.Rest.Hal/Chatter.Rest.Hal.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | tr -d ' \r')
          TAG="hal/v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Chatter.Rest.Hal v${VERSION}"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi